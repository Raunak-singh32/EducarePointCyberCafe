<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Educare Point Cyber Cafe - Stationery, printing & cyber services" />
  
  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo-header.png" />
  
  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <title>Educare Point</title>
  
  <!-- Animated Favicon Script -->
  <script>
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 32;
      canvas.height = 32;
      const ctx = canvas.getContext('2d');
      
      // Load the wheel image
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = '%PUBLIC_URL%/wheel-rotating.gif';
      
      let angle = 0;
      
      function drawFavicon() {
        ctx.clearRect(0, 0, 32, 32);
        ctx.save();
        ctx.translate(16, 16);
        ctx.rotate(angle * Math.PI / 180);
        ctx.translate(-16, -16);
        ctx.drawImage(img, 0, 0, 32, 32);
        ctx.restore();
        
        // Update favicon
        const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.type = 'image/x-icon';
        link.rel = 'shortcut icon';
        link.href = canvas.toDataURL('image/png');
        document.getElementsByTagName('head')[0].appendChild(link);
        
        angle += 3; // rotation speed
        requestAnimationFrame(drawFavicon);
      }
      
      img.onload = function() {
        drawFavicon();
      };
      
      // Fallback if image fails
      img.onerror = function() {
        console.log('Favicon animation fallback');
      };
    })();
  </script>
</head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
